<!-- FICHA DE PERSONAGEM - CHUVA DE NEON -->
<div class="ficha-container">

    <!-- CATEGORIA DADOS PESSOAIS -->
    <fieldset class="categoria-dados">
        <legend>Categoria Dados Pessoais</legend>
        <div class="campo">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
        </div>
        <div class="campo">
            <label for="vulgo">Vulgo:</label>
            <input type="text" id="vulgo" name="vulgo">
        </div>
        <div class="campo">
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade">
        </div>
        <div class="campo">
            <label for="nacionalidade">Nacionalidade:</label>
            <input type="text" id="nacionalidade" name="nacionalidade">
        </div>
        <div class="campo">
            <label for="funcao">Função:</label>
            <input type="text" id="funcao" name="funcao">
        </div>
        <div class="campo-grupo">
            <div class="campo">
                <label for="maldade">Maldade:</label>
                <input type="number" id="maldade" name="maldade">
            </div>
            <div class="campo">
                <label for="remorso">Remorso:</label>
                <input type="number" id="remorso" name="remorso">
            </div>
            <div class="campo">
                <label for="status">Status:</label>
                <input type="number" id="status" name="status">
            </div>
        </div>
    </fieldset>

    <!-- CATEGORIA DARK NET -->
    <fieldset class="categoria-darknet">
        <legend>Categoria Dark Net</legend>
        <div class="campo">
            <label for="dm">Dm:</label>
            <input type="text" id="dm" name="dm" placeholder="www.dm.dn/...">
        </div>
        <div class="campo">
            <label for="void">Void:</label>
            <input type="text" id="void" name="void" placeholder="www.void.dn/...">
        </div>
        <div class="campo">
            <label for="p2k">P2K:</label>
            <input type="text" id="p2k" name="p2k">
        </div>
        <div class="campo">
            <label for="rabbithole">RabbitHole:</label>
            <input type="text" id="rabbithole" name="rabbithole">
        </div>
        <div class="campo">
            <label for="p2c">P2C:</label>
            <input type="text" id="p2c" name="p2c">
        </div>
        <div class="campo">
            <label for="creators">Creators:</label>
            <input type="text" id="creators" name="creators">
        </div>
    </fieldset>

    <!-- PROGRESSÃO E STATUS -->
    <fieldset class="categoria-status">
        <legend>Nível e Status</legend>
        <div class="campo-grupo">
            <div class="campo">
                <label for="nivel">Nível:</label>
                <input type="number" id="nivel" name="nivel" value="1">
            </div>
            <div class="campo">
                <label for="xp">XP:</label>
                <input type="number" id="xp" name="xp" value="0">
            </div>
            <div class="campo">
                <label for="pvs">PVs:</label>
                <input type="number" id="pvs" name="pvs">
            </div>
            <div class="campo">
                <label for="energia">Energia:</label>
                <input type="number" id="energia" name="energia">
            </div>
        </div>
    </fieldset>

    <!-- ATRIBUTOS -->
    <fieldset class="categoria-atributos">
        <legend>Atributos</legend>
        <div class="grid-atributos">
            <div class="campo"><label>Força:</label> <input type="number" name="forca"></div>
            <div class="campo"><label>Constituição:</label> <input type="number" name="constituicao"></div>
            <div class="campo"><label>Destreza:</label> <input type="number" name="destreza"></div>
            <div class="campo"><label>Sabedoria:</label> <input type="number" name="sabedoria"></div>
            <div class="campo"><label>Inteligência:</label> <input type="number" name="inteligencia"></div>
            <div class="campo"><label>Raciocínio:</label> <input type="number" name="raciocinio"></div>
            <div class="campo"><label>Carisma:</label> <input type="number" name="carisma"></div>
            <div class="campo"><label>Manipulação:</label> <input type="number" name="manipulacao"></div>
        </div>
    </fieldset>

    <!-- ATRIBUTOS SECUNDÁRIOS -->
    <fieldset class="categoria-secundarios">
        <legend>Atributos Secundários</legend>
        <div class="grid-atributos">
            <div class="campo"><label>Velocidade:</label> <input type="number" name="velocidade"></div>
            <div class="campo"><label>Agilidade:</label> <input type="number" name="agilidade"></div>
            <div class="campo"><label>Percepção:</label> <input type="number" name="percepcao"></div>
            <div class="campo"><label>Massa Corpórea:</label> <input type="number" name="massa_corporea"></div>
            <div class="campo"><label>Força de Vontade:</label> <input type="number" name="forca_vontade"></div>
        </div>
    </fieldset>

    <!-- PERÍCIAS -->
    <fieldset class="categoria-pericias">
        <legend>Perícias</legend>
        <p class="instrucao">Adicione as perícias do personagem:</p>
        <div id="lista-pericias">
            <!-- Área para adicionar inputs dinamicamente ou listar textareas -->
            <textarea name="pericias" rows="4" placeholder="Ex: Dirigir Veículos (DES/RAC): 2&#10;Armas de Fogo (DES): 1"></textarea>
        </div>
    </fieldset>

    <!-- DESVANTAGENS -->
    <fieldset class="categoria-desvantagens">
        <legend>Desvantagens</legend>
        <p class="instrucao">Adicione as desvantagens do personagem:</p>
        <textarea name="desvantagens" rows="3" placeholder="Ex: Viciado (Anfetaminas), Pavio Curto..."></textarea>
    </fieldset>

    <!-- DETERMINAÇÕES -->
    <fieldset class="categoria-determinacoes">
        <legend>Determinações</legend>
        <textarea name="determinacoes" rows="4" placeholder="1. Digite sua primeira determinação aqui...&#10;2. Segunda determinação..."></textarea>
    </fieldset>

</div>
