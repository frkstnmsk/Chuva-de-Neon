<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE FICHAS | Chuva de Neon</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        /* DIRETAMENTE DO CdN.html */
        :root {
            --bg-dark: #000000;
            --panel-bg: rgba(13, 13, 15, 0.95);
            --neon-purple: #8b5cf6;
            --neon-lime: #a3e635;
            --neon-red: #ef4444;
            --neon-blue: #0ea5e9;
            --text-main: #f0ecd8;
            --text-dim: #94a3b8;
            --border-style: 1px solid rgba(139, 92, 246, 0.2);
            --font-title: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-body);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* CARD DE LOGIN & CONTEÚDO DA FICHA */
        .cyber-panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.15);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            position: relative;
        }

        .cyber-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
        }

        h1, h2, h3 {
            font-family: var(--font-title);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
        }

        h1 { font-size: 1.75rem; color: #fff; text-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
        h2 { font-size: 1.3rem; }

        /* ABAS */
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(240, 236, 216, 0.1);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: var(--font-title);
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: var(--neon-purple);
            border-bottom: 2px solid var(--neon-purple);
            text-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
        }

        /* INPUTS E FORMULÁRIOS */
        label {
            font-family: var(--font-title);
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #09090b;
            border: 1px solid rgba(240, 236, 216, 0.15);
            color: #fff;
            font-family: var(--font-mono);
            box-sizing: border-box;
            border-radius: 4px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
        }

        /* BOTÕES MÁGICOS CRUNCHY */
        .btn-cyber {
            background: transparent;
            color: #fff;
            border: 1px solid var(--neon-purple);
            padding: 12px 24px;
            font-family: var(--font-title);
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .btn-cyber:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
        }

        /* STATUS BADGES */
        .badge {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 2px;
            font-weight: bold;
        }
        .mestre { background: rgba(163, 230, 53, 0.1); color: var(--neon-lime); border: 1px solid var(--neon-lime); }
        .jogador { background: rgba(139, 92, 246, 0.1); color: var(--neon-purple); border: 1px solid var(--neon-purple); }

        /* TELA DE LOGIN OVERLAY */
        #tela-login {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        /* ÁREA DA FICHA (Oculta até logar) */
        #conteudo-ficha { display: none; }

        .dado-firebase {
            font-family: var(--font-mono);
            color: var(--neon-blue);
            text-shadow: 0 0 5px rgba(14, 165, 233, 0.4);
        }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="cyber-panel">
            <h1 style="text-align: center; margin-bottom: 20px;">CHUVA DE NEON</h1>
            
            <div class="tabs">
                <button id="tab-entrar" class="tab-btn active">NET-LOGIN</button>
                <button id="tab-criar" class="tab-btn">REGISTRAR_FICHA</button>
            </div>

            <div id="form-inputs">
                <label>Codinome / ID</label>
                <input type="text" id="login-user" placeholder="Ex: niki_cyber ou mestre">
                
                <label>Chave de Acesso (Senha)</label>
                <input type="password" id="login-pass" placeholder="••••••••">
                
                <button id="btn-acao" class="btn-cyber">Inicializar Link</button>
            </div>

            <p id="login-status-msg" style="color: var(--neon-red); font-family: var(--font-mono); font-size: 0.8rem; margin-top: 15px; display: none; text-align: center;"></p>
        </div>
    </div>

    <div id="conteudo-ficha" class="cyber-panel">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(240, 236, 216, 0.1); padding-bottom: 15px; margin-bottom: 25px;">
            <h1>PAINEL SESSÃO</h1>
            <span id="user-role" class="badge">...</span>
        </header>

        <div id="painel-mestre-seletor" style="display: none; background: rgba(139, 92, 246, 0.05); border: 1px solid rgba(139, 92, 246, 0.2); padding: 15px; margin-bottom: 25px;">
            <label style="color: var(--neon-lime);">Comandar Ficha da Rede:</label>
            <select id="select-ficha"></select>
        </div>

        <h2 style="margin-bottom: 20px;">Ficha Ativa: <span id="nome-ficha-ativa" style="color: var(--neon-purple);">...</span></h2>

        <div style="margin-bottom: 20px;">
            <label>Monitor de Vitalidade (Vida)</label>
            <input id="vida" type="number" placeholder="0">
        </div>

        <div style="margin-bottom: 25px; padding: 15px; background: rgba(239, 68, 68, 0.03); border: 1px solid rgba(239, 68, 68, 0.2);">
            <label style="color: var(--neon-red);">Modificador de Perigo / Dificuldade da Sala (Mestre)</label>
            <input id="mod-mestre" type="number" placeholder="0">
        </div>

        <button id="btn-salvar" class="btn-cyber" style="border-color: var(--neon-blue);">Sincronizar Protocolo</button>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(240, 236, 216, 0.1);">
        <h3 style="font-size: 1rem; color: var(--text-dim); margin-bottom: 15px;">📡 Logs do Firebase em Tempo Real:</h3>
        <div style="font-family: var(--font-mono); font-size: 0.9rem; line-height: 1.6;">
            <p>Vida da Ficha Ativa: <span id="vidaAtual" class="dado-firebase">...</span></p>
            <p>Modificador Ativo: <span id="modAtual" class="dado-firebase">...</span></p>
        </div>
        
        <button id="btn-logout" class="btn-cyber" style="border-color: var(--text-dim); color: var(--text-dim); margin-top: 20px; padding: 6px 12px; font-size: 0.8rem; width: auto; display: block; margin-left: auto;">Desconectar</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
