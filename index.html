<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ficha Chuva de Neon // Terminal</title>
    <style>
        :root {
            --bg-principal: #040406;
            --bg-card: #0a0b10;
            --bg-input: #11121a;
            --neon-rosa: #ff0055;
            --neon-ciano: #00ffcc;
            --neon-roxo: #7b2cbf;
            --texto: #f1f5f9;
            --border-glow: 0 0 15px rgba(255, 0, 85, 0.4);
            --input-glow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .ficha-container {
            width: 100%;
            max-width: 950px;
            background: var(--bg-card);
            border: 2px solid var(--neon-rosa);
            border-radius: 4px;
            padding: 30px;
            box-shadow: var(--border-glow);
            box-sizing: border-box;
        }

        h1.titulo-sistema {
            text-align: center;
            color: var(--neon-ciano);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: 0;
            margin-bottom: 35px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.6);
            font-size: 2.2rem;
            border-bottom: 2px dashed var(--neon-roxo);
            padding-bottom: 20px;
        }

        fieldset {
            border: 1px solid var(--neon-roxo);
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(17, 18, 26, 0.6);
            position: relative;
        }

        legend {
            color: var(--neon-ciano);
            font-weight: bold;
            text-transform: uppercase;
            padding: 0 15px;
            letter-spacing: 2px;
            font-size: 1rem;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .row:last-child {
            margin-bottom: 0;
        }

        .campo {
            flex: 1;
            min-width: 140px;
            display: flex;
            flex-direction: column;
        }

        .campo.largo {
            flex: 2;
        }

        .campo.curto {
            flex: 0 1 100px;
        }

        label {
            font-size: 0.85rem;
            color: var(--neon-rosa);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        input[type="text"], 
        input[type="number"], 
        textarea {
            background-color: var(--bg-input);
            border: 1px solid var(--neon-roxo);
            border-radius: 0;
            color: #fff;
            padding: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            width: 100%;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-ciano);
            box-shadow: var(--input-glow);
            color: var(--neon-ciano);
        }

        .grid-atributos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .grid-atributos .campo {
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-input);
            padding: 8px 15px;
            border: 1px solid rgba(123, 44, 191, 0.5);
            border-left: 4px solid var(--neon-rosa);
        }

        .grid-atributos label {
            margin-bottom: 0;
        }

        .grid-atributos input {
            width: 70px;
            text-align: center;
            padding: 6px;
            border-color: rgba(123, 44, 191, 0.5);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-salvar {
            background: transparent;
            color: var(--neon-ciano);
            border: 2px solid var(--neon-ciano);
            padding: 15px 40px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: var(--input-glow);
        }

        .btn-salvar:hover {
            background: var(--neon-ciano);
            color: var(--bg-principal);
            box-shadow: 0 0 15px var(--neon-ciano);
        }
    </style>
</head>
<body>

<div class="ficha-container">
    <h1 class="titulo-sistema">Chuva de Neon // Terminal de Ficha</h1>

    <form id="fichaForm">
        <!-- CATEGORIA DADOS PESSOAIS -->
        <fieldset>
            <legend>Categoria Dados Pessoais</legend>
            <div class="row">
                <div class="campo largo">
                    <label>Nome</label>
                    <input type="text" name="nome">
                </div>
                <div class="campo">
                    <label>Vulgo</label>
                    <input type="text" name="vulgo">
                </div>
                <div class="campo curto">
                    <label>Idade</label>
                    <input type="number" name="idade">
                </div>
            </div>
            <div class="row">
                <div class="campo">
                    <label>Nacionalidade</label>
                    <input type="text" name="nacionalidade">
                </div>
                <div class="campo">
                    <label>Função</label>
                    <input type="text" name="funcao">
                </div>
            </div>
            <div class="row">
                <div class="campo">
                    <label>Maldade</label>
                    <input type="number" name="maldade">
                </div>
                <div class="campo">
                    <label>Remorso</label>
                    <input type="number" name="remorso">
                </div>
                <div class="campo">
                    <label>Status</label>
                    <input type="number" name="status">
                </div>
            </div>
        </fieldset>

        <!-- CATEGORIA DARK NET -->
        <fieldset>
            <legend>Categoria Dark Net</legend>
            <div class="row">
                <div class="campo">
                    <label>Dm</label>
                    <input type="text" name="dm" placeholder="www.dm.dn/...">
                </div>
                <div class="campo">
                    <label>Void</label>
                    <input type="text" name="void" placeholder="www.void.dn/...">
                </div>
            </div>
            <div class="row">
                <div class="campo">
                    <label>P2K</label>
                    <input type="text" name="p2k">
                </div>
                <div class="campo">
                    <label>RabbitHole</label>
                    <input type="text" name="rabbithole">
                </div>
            </div>
            <div class="row">
                <div class="campo">
                    <label>P2C</label>
                    <input type="text" name="p2c">
                </div>
                <div class="campo">
                    <label>Creators</label>
                    <input type="text" name="creators">
                </div>
            </div>
        </fieldset>

        <!-- PROGRESSÃO E STATUS -->
        <fieldset>
            <legend>Nível e Status</legend>
            <div class="row">
                <div class="campo">
                    <label>Nível</label>
                    <input type="number" name="nivel" value="1">
                </div>
                <div class="campo">
                    <label>XP</label>
                    <input type="number" name="xp" value="0">
                </div>
                <div class="campo">
                    <label>PVs</label>
                    <input type="number" name="pvs">
                </div>
                <div class="campo">
                    <label>Energia</label>
                    <input type="number" name="energia">
                </div>
            </div>
        </fieldset>

        <!-- ATRIBUTOS -->
        <fieldset>
            <legend>Atributos</legend>
            <div class="grid-atributos">
                <div class="campo"><label>Força</label> <input type="number" name="forca"></div>
                <div class="campo"><label>Constituição</label> <input type="number" name="constituicao"></div>
                <div class="campo"><label>Destreza</label> <input type="number" name="destreza"></div>
                <div class="campo"><label>Sabedoria</label> <input type="number" name="sabedoria"></div>
                <div class="campo"><label>Inteligência</label> <input type="number" name="inteligencia"></div>
                <div class="campo"><label>Raciocínio</label> <input type="number" name="raciocinio"></div>
                <div class="campo"><label>Carisma</label> <input type="number" name="carisma"></div>
                <div class="campo"><label>Manipulação</label> <input type="number" name="manipulacao"></div>
            </div>
        </fieldset>

        <!-- ATRIBUTOS SECUNDÁRIOS -->
        <fieldset>
            <legend>Atributos Secundários</legend>
            <div class="grid-atributos">
                <div class="campo"><label>Velocidade</label> <input type="number" name="velocidade"></div>
                <div class="campo"><label>Agilidade</label> <input type="number" name="agilidade"></div>
                <div class="campo"><label>Percepção</label> <input type="number" name="percepcao"></div>
                <div class="campo"><label>Massa Corp.</label> <input type="number" name="massa_corporea"></div>
                <div class="campo"><label>Vontade</label> <input type="number" name="forca_vontade"></div>
            </div>
        </fieldset>

        <!-- PERÍCIAS -->
        <fieldset>
            <legend>Perícias</legend>
            <textarea name="pericias" placeholder="Insira as perícias e valores..."></textarea>
        </fieldset>

        <!-- DESVANTAGENS -->
        <fieldset>
            <legend>Desvantagens</legend>
            <textarea name="desvantagens" placeholder="Insira as desvantagens de histórico ou traumas..."></textarea>
        </fieldset>

        <!-- DETERMINAÇÕES -->
        <fieldset>
            <legend>Determinações</legend>
            <textarea name="determinacoes" placeholder="1. Suas amarras psicológicas e objetivos principais..."></textarea>
        </fieldset>
        
        <div class="btn-container">
            <button type="button" class="btn-salvar" onclick="salvarFicha()">Baixar Dados da Ficha</button>
        </div>
    </form>
</div>

<script>
    function salvarFicha() {
        const form = document.getElementById('fichaForm');
        const formData = new FormData(form);
        let textoFicha = "=== FICHA DE PERSONAGEM - CHUVA DE NEON ===\n\n";
        
        for (let [key, value] of formData.entries()) {
            textoFicha += `${key.toUpperCase()}: ${value}\n`;
        }
        
        const blob = new Blob([textoFicha], { type: 'text/plain' });
        const link = document.createElement('a');
        link.download = `ficha_${formData.get('vulgo') || 'personagem'}.txt`;
        link.href = window.URL.createObjectURL(blob);
        link.click();
    }
</script>

</body>
</html>
